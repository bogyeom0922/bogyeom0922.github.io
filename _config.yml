about_content: | # this will include new lines to allow paragraphs
  백엔드 개발자로서 여러 팀 프로젝트에 참여하며 기초부터 다양한 기술을 익혔습니다. Node.js, SpringBoot, Java, MySQL, Python, AWS 등을 사용한 백엔드 개발과 간단한 프론트엔드 작업을 통해 실제 서비스를 개발하는 경험을 쌓았습니다.

  저는 팀원들과의 소통과 협업을 가장 중요하게 생각합니다. 개발 과정에서 기술적인 문제 해결뿐만 아니라, 팀의 목표를 달성하고 모두가 함께 성장할 수 있도록 돕는 데 큰 가치를 둡니다. 새로운 문제를 해결하며 팀의 목표를 함께 이루어나가는 과정에서 협업의 중요성을 깨닫고, 모두가 함께 성장하는 즐거움을 느꼈습니다.

  단순히 기능을 완성하는 데 그치지 않고, 지속적으로 코드를 리팩토링하며 확장성과 유지보수성이 뛰어난 백엔드 아키텍처를 설계하는 데 몰입해왔습니다. 이런 경험을 통해 더 나은 개발자로 성장해 나가고 있습니다.

